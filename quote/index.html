<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Chess · Конструктор цитат</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,500;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   ТОКЕНЫ · BRANDBOOK V2.7 · ТЁМНАЯ ТЕМА
   ═══════════════════════════════════════════════════════════ */
:root {
  --c-paper:        #000000;
  --c-card:         #0f0f0f;
  --c-ink:          #ffffff;
  --c-ink-muted:    #999999;
  --c-ink-inv:      #0a0a0a;
  --c-accent:       #e11919;
  --c-accent-hover: #c91515;
  --c-rule:         #1f1f1f;
  --c-rule-soft:    #161616;

  --ff-sans:  'Inter', system-ui, sans-serif;
  --ff-serif: 'PT Serif', Georgia, serif;

  --fs-xs:  11px;
  --fs-sm:  13px;
  --fs-md:  16px;
  --fs-lg:  22px;
  --fs-xl:  32px;
  --fs-xxl: 48px;

  --fw-regular: 400;
  --fw-medium:  500;
  --fw-bold:    700;
  --fw-black:   900;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;
  --space-9: 96px;
  --space-10: 128px;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;

  /* ── UI-токены инструмента (не из брендбука постов) ─── */
  --tool-sidebar:    360px;
  --tool-max-width:  1600px;
  --tool-tap:        44px;   /* WCAG минимум для тач-целей */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { font-feature-settings: "tnum"; }

body {
  font-family: var(--ff-sans);
  background: var(--c-paper);
  color: var(--c-ink);
  font-size: var(--fs-md);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Лейаут ────────────────────────────────────────── */
.app {
  display: flex;
  gap: var(--space-6);
  padding: var(--space-6);
  align-items: flex-start;
  max-width: var(--tool-max-width);
  margin: 0 auto;
}

.controls {
  width: var(--tool-sidebar);
  flex-shrink: 0;
  background: var(--c-card);
  border: 1px solid var(--c-rule);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
}

.preview-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: var(--space-4);
  background: var(--c-card);
  border: 1px solid var(--c-rule);
  border-radius: var(--radius-lg);
  position: sticky;
  top: var(--space-6);
}

canvas {
  max-width: 100%;
  height: auto;
  border-radius: var(--radius-md);
  display: block;
}

/* ── Заголовок ─────────────────────────────────────── */
.controls-header {
  padding-bottom: var(--space-5);
  margin-bottom: var(--space-5);
  border-bottom: 1px solid var(--c-rule);
}
.controls-header .eyebrow {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  color: var(--c-accent);
  letter-spacing: 0.08em;
  margin-bottom: var(--space-2);
}
.controls-header h1 {
  font-size: var(--fs-xl);
  font-weight: var(--fw-black);
  line-height: 1.25;
  margin-bottom: var(--space-2);
}
.controls-header .meta {
  font-size: var(--fs-sm);
  color: var(--c-ink-muted);
}

/* ── Секции ────────────────────────────────────────── */
.section { margin-bottom: var(--space-5); }
.section-label {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  color: var(--c-accent);
  letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
}

/* ── Радио-группа ──────────────────────────────────── */
.radio-group {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin-top: 0;
}
.radio {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3);
  border: 1px solid var(--c-rule);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: var(--fs-sm);
  font-weight: var(--fw-medium);
  color: var(--c-ink);
  background: var(--c-paper);
  transition: border-color 0.15s, background 0.15s;
  margin: 0;
}
.radio:hover {
  border-color: var(--c-ink-muted);
}
.radio input[type="radio"] {
  margin: 0;
  accent-color: var(--c-accent);
  width: var(--space-4);
  height: var(--space-4);
}
.radio:has(input:checked) {
  border-color: var(--c-accent);
  background: var(--c-card);
}

/* ── Hidden helper ─────────────────────────────────── */
.hidden { display: none; }

/* ── Поля ──────────────────────────────────────────── */
label {
  display: block;
  font-size: var(--fs-sm);
  font-weight: var(--fw-medium);
  color: var(--c-ink-muted);
  margin-bottom: var(--space-1);
  margin-top: var(--space-3);
}
.section > label:first-of-type { margin-top: 0; }

input[type="text"],
textarea {
  width: 100%;
  padding: var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--c-rule);
  background: var(--c-paper);
  color: var(--c-ink);
  font-family: inherit;
  font-size: var(--fs-sm);
  resize: vertical;
  min-height: var(--tool-tap);
}
textarea {
  min-height: var(--space-9);
  line-height: 1.5;
}

input[type="text"]:focus,
textarea:focus {
  outline: none;
  border-color: var(--c-accent);
}

input[type="file"] {
  width: 100%;
  font-size: var(--fs-xs);
  color: var(--c-ink-muted);
  font-family: inherit;
}
input[type="file"]::file-selector-button {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-rule);
  background: var(--c-paper);
  color: var(--c-ink);
  font-family: inherit;
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  cursor: pointer;
  margin-right: var(--space-3);
  min-height: var(--space-6);
}
input[type="file"]::file-selector-button:hover {
  border-color: var(--c-ink-muted);
}

input[type="range"] {
  width: 100%;
  margin-top: var(--space-2);
  accent-color: var(--c-accent);
  height: var(--space-5);
}

small {
  font-size: var(--fs-xs);
  color: var(--c-ink-muted);
  display: block;
  margin-top: var(--space-1);
}

button {
  width: 100%;
  padding: var(--space-4) var(--space-5);
  border: 0;
  border-radius: var(--radius-md);
  background: var(--c-accent);
  color: var(--c-ink);
  font-family: inherit;
  font-size: var(--fs-sm);
  font-weight: var(--fw-bold);
  cursor: pointer;
  margin-top: var(--space-5);
  transition: background-color 0.15s;
  min-height: var(--space-7);
}
button:hover { background: var(--c-accent-hover); }
button:disabled { opacity: 0.4; cursor: default; }
button:disabled:hover { background: var(--c-accent); }

/* ── АДАПТИВ ───────────────────────────────────────── */
@media (max-width: 900px) {
  .app {
    flex-direction: column;
    padding: var(--space-3);
    gap: var(--space-3);
  }
  .controls {
    width: 100%;
    padding: var(--space-5);
  }
  .preview-wrap {
    width: 100%;
    position: relative;
    top: auto;
    padding: var(--space-3);
    order: -1; /* превью наверх на мобильном */
  }
  .controls-header h1 {
    font-size: var(--fs-lg);
  }
}

@media (max-width: 480px) {
  .app { padding: var(--space-2); }
  .controls { padding: var(--space-4); }
  .preview-wrap { padding: var(--space-2); }
}
</style>
</head>
<body>
<div class="app">

  <aside class="controls">
    <div class="controls-header">
      <div class="eyebrow">CITY CHESS · ИНСТРУМЕНТ</div>
      <h1>Карточка</h1>
      <p class="meta">1080 × 1080 · PNG</p>
    </div>

    <div class="section">
      <div class="section-label">РЕЖИМ</div>
      <div class="radio-group">
        <label class="radio">
          <input type="radio" name="mode" value="quote" checked>
          <span>Цитата</span>
        </label>
        <label class="radio">
          <input type="radio" name="mode" value="cover">
          <span>Обложка</span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-label">ФОТОГРАФИЯ</div>
      <label>Файл</label>
      <input type="file" id="imageInputTop" accept="image/*">

      <label>Сдвиг по горизонтали</label>
      <input type="range" id="topShiftX" min="0" max="100" value="50">
      <small>0 — слева, 50 — центр, 100 — справа</small>

      <label>Сдвиг по вертикали</label>
      <input type="range" id="topShiftY" min="0" max="100" value="50">
      <small>0 — вверх, 50 — центр, 100 — вниз</small>
    </div>

    <!-- Поля для режима «Цитата» -->
    <div class="section" id="quoteFields">
      <div class="section-label">ТЕКСТ ЦИТАТЫ</div>
      <label>Цитата</label>
      <textarea id="quoteText">«Хикару действует в рамках правил максимально прагматично — любой на его месте делал бы то же самое»</textarea>

      <label>Автор</label>
      <input type="text" id="authorText" value="— GM ФАБИАНО КАРУАНА">

      <label>Описание</label>
      <input type="text" id="descText" value="о способе Накамуры пробиться в ТП">
    </div>

    <!-- Поля для режима «Обложка» -->
    <div class="section hidden" id="coverFields">
      <div class="section-label">ТЕКСТ ОБЛОЖКИ</div>
      <label>Метка наверху</label>
      <input type="text" id="coverEyebrow" value="Интервью · Май 2026">

      <label>Заголовок</label>
      <textarea id="coverTitle">Каруана о Магнусе</textarea>

      <label>Источник</label>
      <input type="text" id="coverSource" value="S-Squared Podcast">
    </div>

    <button id="downloadBtn" disabled>Скачать PNG</button>
  </aside>

  <div class="preview-wrap">
    <canvas id="card" width="1080" height="1080"></canvas>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   ЦВЕТА · ТЕ ЖЕ ТОКЕНЫ, ЧТО В CSS
   ═══════════════════════════════════════════════════════════ */
const COLOR = {
  paper:       '#000000',
  card:        '#0f0f0f',
  ink:         '#ffffff',
  inkMuted:    '#999999',
  inkInv:      '#0a0a0a',
  accent:      '#e11919',
  accentHover: '#c91515',
};

const FONT_SANS  = '"Inter", system-ui, sans-serif';
const FONT_SERIF = '"PT Serif", Georgia, serif';

const WIDTH = 1080;
const HEIGHT = 1080;
const BOTTOM_H = 432;
const IMAGE_H = HEIGHT - BOTTOM_H; // 648

/* ═══════════════════════════════════════════════════════════
   РУССКАЯ ТИПОГРАФИКА · §07 БРЕНДБУКА V2.7
   Применяется автоматически к пользовательскому вводу.
   ═══════════════════════════════════════════════════════════ */
const NBSP  = '\u00A0';   // обычный неразрывный пробел
const NNBSP = '\u202F';   // узкий неразрывный пробел (для денежных сумм)

const SHORT_PREPS = ['в','к','с','о','у','на','по','за','до','от','из','не','ни','и','а','но'];

function applyTypography(text) {
  if (!text) return text;
  // 1) Неразрывный пробел перед em-dash
  text = text.replace(/ +—/g, NBSP + '—');
  // 2) Неразрывный пробел после коротких предлогов и союзов
  const re = new RegExp('(^|[\\s\\u00A0«"„(\\[])(' + SHORT_PREPS.join('|') + ') ', 'gi');
  text = text.replace(re, '$1$2' + NBSP);
  // 3) Узкий неразрывный пробел в денежных суммах: «$10 000» → «$10\u202F000»
  text = text.replace(/(\$\d{1,3}) (\d{3})/g, '$1' + NNBSP + '$2');
  text = text.replace(/(\$\d{1,3}\u202F\d{3}) (\d{3})/g, '$1' + NNBSP + '$2');
  return text;
}

const canvas = document.getElementById('card');
const ctx = canvas.getContext('2d');

const quoteEl  = document.getElementById('quoteText');
const authorEl = document.getElementById('authorText');
const descEl   = document.getElementById('descText');
const imgTopInput    = document.getElementById('imageInputTop');
const topShiftXInput = document.getElementById('topShiftX');
const topShiftYInput = document.getElementById('topShiftY');
const downloadBtn = document.getElementById('downloadBtn');

// Новые элементы для режима «Обложка»
const coverEyebrowEl = document.getElementById('coverEyebrow');
const coverTitleEl   = document.getElementById('coverTitle');
const coverSourceEl  = document.getElementById('coverSource');
const quoteFields    = document.getElementById('quoteFields');
const coverFields    = document.getElementById('coverFields');
const modeRadios     = document.querySelectorAll('input[name="mode"]');

let topImage = null;
let topShiftX = 50;
let topShiftY = 50;
let mode = 'quote';                // 'quote' | 'cover'

/* ═══════════════════════════════════════════════════════════
   ГЕОМЕТРИЯ ПО РЕЖИМАМ
   ═══════════════════════════════════════════════════════════ */
// Режим «Цитата»: фото 648 сверху, текст внизу
// Режим «Обложка»: фото 624 сверху (--cover-photo-height из брендбука),
//   eyebrow+заголовок в зоне 660+, футер с источником и датой внизу
function getImageHeight() {
  return mode === 'cover' ? 624 : IMAGE_H;
}

/* ── Утилиты ───────────────────────────────────────── */
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const testWidth = ctx.measureText(testLine).width;
    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line.trim(), x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line.trim(), x, y);
  return y + lineHeight;
}

function drawTopImage() {
  if (!topImage) return;
  const h = getImageHeight();
  const x = 0, y = 0, w = WIDTH;

  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();

  const scale = Math.max(w / topImage.width, h / topImage.height);
  const dw = topImage.width * scale;
  const dh = topImage.height * scale;

  const extraX = Math.max(0, dw - w);
  const extraY = Math.max(0, dh - h);

  const pX = topShiftX / 100;
  const pY = topShiftY / 100;

  const dx = x - extraX * pX;
  const dy = y - extraY * pY;

  ctx.drawImage(topImage, dx, dy, dw, dh);
  ctx.restore();

  // В режиме «Обложка» — добавляем затемняющий градиент снизу
  // (как .cover-photo::after в брендбуке: rgba(10,10,10,0.4) на 120px)
  if (mode === 'cover') {
    const gradH = 120;
    const grad = ctx.createLinearGradient(0, h - gradH, 0, h);
    grad.addColorStop(0, 'rgba(10, 10, 10, 0)');
    grad.addColorStop(1, 'rgba(10, 10, 10, 0.4)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, h - gradH, w, gradH);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  const radius = typeof r === 'number' ? {tl:r, tr:r, br:r, bl:r} : r;
  ctx.beginPath();
  ctx.moveTo(x + radius.tl, y);
  ctx.lineTo(x + w - radius.tr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius.tr);
  ctx.lineTo(x + w, y + h - radius.br);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius.br, y + h);
  ctx.lineTo(x + radius.bl, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius.bl);
  ctx.lineTo(x, y + radius.tl);
  ctx.quadraticCurveTo(x, y, x + radius.tl, y);
  ctx.closePath();
}

/* ═══════════════════════════════════════════════════════════
   ОТРИСОВКА
   ═══════════════════════════════════════════════════════════ */
function draw() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  // Базовый фон — карточка тёмная
  ctx.fillStyle = COLOR.card;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  const imgH = getImageHeight();

  // Верхняя зона: фото или заглушка
  if (topImage) {
    drawTopImage();
  } else {
    ctx.fillStyle = COLOR.paper;
    ctx.fillRect(0, 0, WIDTH, imgH);

    ctx.fillStyle = COLOR.inkMuted;
    ctx.font = `500 16px ${FONT_SANS}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Загрузите фотографию', WIDTH / 2, imgH / 2);
  }

  drawBrandCapsule();

  if (mode === 'cover') {
    drawCoverText();
    drawCoverFooter();
  } else {
    drawBottomText();
  }
}

/* ── Бренд-капсула · спец-компонент по брендбуку v2.7 §05 ──
   В сервисе цитат фон карточки тёмный — поэтому стикер белый
   с тёмным текстом и красной точкой. Размеры фиксированные. */
function drawBrandCapsule() {
  const text = 'CITY CHESS';
  const fontSize = 18;
  const padX = 20;
  const padY = 10;
  const dotSize = 10;
  const gap = 10;
  const x = 64;          // --space-8 (выровнено с боковыми отступами текста)
  const y = 48;          // --space-7
  const letterSp = -0.18; // -0.01em × 18px

  ctx.save();
  ctx.font = `900 ${fontSize}px ${FONT_SANS}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '-0.01em';

  const metrics = ctx.measureText(text);
  const textWidth = metrics.width + letterSp * (text.length - 1);
  const ascent  = metrics.actualBoundingBoxAscent  || fontSize;
  const descent = metrics.actualBoundingBoxDescent || 4;
  const textHeight = ascent + descent;

  const innerWidth = dotSize + gap + textWidth;
  const w = innerWidth + padX * 2;
  const h = textHeight + padY * 2;
  const r = h / 2;

  // Белая пилюля (на тёмном фоне инверсия — белая)
  roundRect(ctx, x, y, w, h, r);
  ctx.fillStyle = COLOR.ink;
  ctx.fill();

  // Красная точка
  const dotX = x + padX;
  const dotY = y + h / 2;
  ctx.beginPath();
  ctx.arc(dotX + dotSize / 2, dotY, dotSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = COLOR.accent;
  ctx.fill();

  // Тёмный текст (инверсия ink → ink-inv)
  const textX = dotX + dotSize + gap;
  const textY = y + h / 2;
  ctx.fillStyle = COLOR.inkInv;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, textX, textY);

  ctx.restore();
}

/* ── Текст в нижнем блоке ──────────────────────────── */
function drawBottomText() {
  // Применяем русскую типографику ко всем пользовательским полям
  const quote  = applyTypography(quoteEl.value.trim());
  const author = applyTypography(authorEl.value.trim());
  const desc   = applyTypography(descEl.value.trim());

  // ─── АСИММЕТРИЧНЫЕ ОТСТУПЫ ВНУТРИ ТЕКСТОВОЙ ЗОНЫ ────
  // По §06 v2.7: симметричные поля запрещены.
  // 48 / 64 / 64 (top / sides / bottom) — top меньше боковых.
  const paddingLeft   = 64;  // --space-8
  const paddingRight  = 64;  // --space-8
  const paddingTop    = 48;  // --space-7
  let y = IMAGE_H + paddingTop;

  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  // ─── ЦИТАТА · PT Serif Regular, 48px, line-height 1.25 ───
  // По §04.8 v2.7 — pull quote, серифный шрифт оправдан
  const quoteFontSize   = 48;          // --fs-xxl (display-tier)
  const quoteLineHeight = 48 * 1.25;   // 60px
  ctx.fillStyle = COLOR.ink;
  ctx.font = `400 ${quoteFontSize}px ${FONT_SERIF}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';  // строчные — 0
  y = wrapText(ctx, quote, paddingLeft, y, WIDTH - paddingLeft - paddingRight, quoteLineHeight);

  // ─── ЗАЗОР: ЦИТАТА → АВТОР ───
  // Одна высота строки цитаты — между блоками (правило внутреннего и внешнего §01.A)
  y += quoteLineHeight;  // 60px

  // ─── АВТОР · Inter Bold Italic, 22px, UPPERCASE ───
  // По §04.1 v2.7: UPPERCASE-метка micro-tier (22px) → letter-spacing 0.08em
  ctx.fillStyle = COLOR.ink;
  ctx.font = `italic 700 22px ${FONT_SANS}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.08em';
  ctx.fillText(author, paddingLeft, y);

  // ─── ЗАЗОР: АВТОР → ОПИСАНИЕ ───
  // Внутри пары «автор + его роль» — связаны теснее, чем цитата ↔ автор
  y += 32;  // --space-6 (line-height строки 22 × 1.25 ≈ 28, округлено к токену)

  // ─── ОПИСАНИЕ · Inter Medium Italic, 22px, строчные, приглушённый ───
  // Строчные — letter-spacing 0 (см. §04.1)
  ctx.fillStyle = COLOR.inkMuted;
  ctx.font = `italic 500 22px ${FONT_SANS}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
  ctx.fillText(desc, paddingLeft, y);
}

/* ═══════════════════════════════════════════════════════════
   РЕЖИМ «ОБЛОЖКА» · текст под фото
   ═══════════════════════════════════════════════════════════ */
function drawCoverText() {
  const eyebrow = applyTypography(coverEyebrowEl.value.trim()).toUpperCase();
  const title   = applyTypography(coverTitleEl.value.trim());

  // Поля по брендбуку v2.7 §06: top=660 (фото 624 + зазор 36)
  // Боковые: var(--space-8) = 64
  const paddingLeft  = 64;
  const paddingRight = 64;
  const maxWidth     = WIDTH - paddingLeft - paddingRight;
  let y = 624 + 36;  // фото + cover-text-offset

  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  // ─── EYEBROW · Inter Bold 13px UPPERCASE, акцентный цвет ───
  // По §04.1 v2.7: UPPERCASE micro-tier → letter-spacing 0.08em
  // Размер --fs-sm = 13px, как в .eyebrow брендбука v2.7
  ctx.fillStyle = COLOR.accent;
  ctx.font = `700 13px ${FONT_SANS}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.08em';
  ctx.fillText(eyebrow, paddingLeft, y);

  // Зазор eyebrow → h1: --space-5 = 24
  y += 13 + 24;

  // ─── ЗАГОЛОВОК · Inter Black 72px, display-tier (÷4=0) ───
  // По §04 v2.7: крупные дисплейные заголовки имеют letter-spacing -0.01em
  const titleFontSize = 72;
  const titleLineHeight = titleFontSize * 1.1;

  ctx.fillStyle = COLOR.ink;
  ctx.font = `900 ${titleFontSize}px ${FONT_SANS}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '-0.01em';
  wrapText(ctx, title, paddingLeft, y, maxWidth, titleLineHeight);
}

/* ═══════════════════════════════════════════════════════════
   РЕЖИМ «ОБЛОЖКА» · подвал «ИСТОЧНИК · X»
   Дата не дублируется тут — она уже стоит в eyebrow наверху
   ═══════════════════════════════════════════════════════════ */
function drawCoverFooter() {
  const source = applyTypography(coverSourceEl.value.trim());

  const paddingLeft  = 64;
  const paddingRight = 64;
  const bottomGap    = 64;  // --space-8 от низа слайда

  // Разделительная линия 1px
  const lineY = HEIGHT - bottomGap - 20;
  ctx.strokeStyle = COLOR.inkMuted;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(paddingLeft, lineY);
  ctx.lineTo(WIDTH - paddingRight, lineY);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Весь текст футера — одной строкой. Это гарантирует, что точка
  // стоит ровно между словами, как в eyebrow.
  // Цветовых акцентов нет — это редакционная метка, не заголовок.
  const textY = HEIGHT - bottomGap + 4;
  ctx.font = `700 13px ${FONT_SANS}`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.08em';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = COLOR.inkMuted;

  ctx.fillText(`ИСТОЧНИК · ${source.toUpperCase()}`, paddingLeft, textY);
}

/* ═══════════════════════════════════════════════════════════
   ОБРАБОТЧИКИ
   ═══════════════════════════════════════════════════════════ */
imgTopInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      topImage = img;
      draw();
      downloadBtn.disabled = false;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

topShiftXInput.addEventListener('input', () => {
  topShiftX = Number(topShiftXInput.value);
  draw();
});
topShiftYInput.addEventListener('input', () => {
  topShiftY = Number(topShiftYInput.value);
  draw();
});

[quoteEl, authorEl, descEl, coverEyebrowEl, coverTitleEl, coverSourceEl].forEach(el => {
  el.addEventListener('input', draw);
});

// Переключатель «Цитата ↔ Обложка»
modeRadios.forEach(r => {
  r.addEventListener('change', () => {
    mode = r.value;
    if (mode === 'cover') {
      quoteFields.classList.add('hidden');
      coverFields.classList.remove('hidden');
    } else {
      coverFields.classList.add('hidden');
      quoteFields.classList.remove('hidden');
    }
    draw();
  });
});

downloadBtn.addEventListener('click', () => {
  const dataURL = canvas.toDataURL('image/png');
  const link = document.createElement('a');
  link.href = dataURL;
  link.download = mode === 'cover' ? 'citychess-cover.png' : 'citychess-quote.png';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

// Перерисовываем после загрузки шрифтов
// Canvas в отличие от DOM не активирует шрифт автоматически —
// нужно явно вызвать document.fonts.load() для каждой комбинации weight/size,
// иначе Canvas тихо подставит fallback (system-ui), даже если шрифт загружен в CSS
async function ensureFontsAndDraw() {
  if (!document.fonts || !document.fonts.load) {
    draw();
    return;
  }
  try {
    await Promise.all([
      document.fonts.load('500 16px Inter'),
      document.fonts.load('700 13px Inter'),
      document.fonts.load('900 18px Inter'),
      document.fonts.load('900 72px Inter'),
      document.fonts.load('italic 500 22px Inter'),
      document.fonts.load('italic 700 22px Inter'),
      document.fonts.load('400 48px "PT Serif"'),
    ]);
  } catch (e) {
    console.warn('Font preload error:', e);
  }
  draw();
}

ensureFontsAndDraw();
</script>
